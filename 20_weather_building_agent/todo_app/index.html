<html lang="en">
  <head>
    <meta charset="utf-8" /><title>Modern Todo App</title><meta name="viewport" content="width=device-width,initial-scale=1" /><link rel="stylesheet" href="styles.css" /></head><body><div id="app" aria-label="Todo app"><h1>Todo App</h1><div class="task-controls"><input id="search" type="text" aria-label="Search tasks" placeholder="Search tasks..." /><input id="new-task" type="text" aria-label="Add new task" placeholder="Add a new task" /><button id="add-btn" aria-label="Add task">Add</button></div><div style="display:flex; gap:7px; justify-content:center; margin-bottom:16px;"><button class="icon-btn" id="filter-all" aria-label="Show all tasks">All</button><button class="icon-btn" id="filter-active" aria-label="Show active tasks">Active</button><button class="icon-btn" id="filter-completed" aria-label="Show completed tasks">Completed</button></div><ul id="task-list" aria-live="polite" /></ul></div><script src="script.js"></script></body></html>
